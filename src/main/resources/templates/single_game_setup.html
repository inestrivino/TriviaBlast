<!--
    Formulario para configurar una partida individual
    (categoría, dificultad, número de preguntas)
    Hace POST a /game/start_single_game
-->

<!DOCTYPE html>
<html lang="en" class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Singleplayer Game Setup</title>
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="d-flex justify-content-center pt-5 min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
                    <h1 class="mb-5 text-center">Game Setup</h1>

                    <form th:action="@{/game/start_single_game}" method="post">

                        <!-- Category-->
                        <div class="mb-5">
                            <label class="form-label fs-5">Choose the question category:</label>
                            <select class="form-select" name="category">
                                <option value="" selected>
                                    Any Category
                                </option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.label}">
                                </option>
                            </select>
                        </div>

                        <!-- Difficulty-->
                        <div class="mb-5">
                            <label class="form-label fs-5">Choose the game difficulty:</label>
                            <select class="form-select" name="difficulty">
                                <option value="easy" selected>Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>

                        <!-- Number of questions -->
                        <div class="mb-5">
                            <label class="form-label fs-5">Choose number of questions:</label>
                            <select class="form-select" name="questionCount">
                                <option value="5" selected>5</option>
                                <option value="10">10</option>
                                <option value="15">15</option>
                                <option value="20">20</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                Start
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />

</body>

</html>
