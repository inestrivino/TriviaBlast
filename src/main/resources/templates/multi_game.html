<!DOCTYPE html>
<html lang="es" class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>TriviaBlast Game</title>
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="h-100 d-flex flex-column">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

        <!-- Exit button and game status -->
        <div class="w-100 d-flex justify-content-between align-items-center mb-3 px-2 px-md-0"
            style="max-width: 700px;">
            <a href="/" class="btn btn-danger me-2">Exit Game</a>
        </div>

    <main class="flex-grow-1 container-fluid d-flex justify-content-center align-items-start p-3">

        <div class="d-flex flex-wrap justify-content-center align-items-start gap-3"
            style="width: 100%; max-width: 1200px;">

            <div style="flex-shrink: 0; width: 70vw; max-width: 800px;">
                <div class="border rounded p-3" id="tablero-container"
                    style="width: 100%; height: auto; max-height: 80vh; overflow: hidden;">
                    <!-- Aquí se generará el tablero SVG -->
                </div>
            </div>

            <div style="flex-shrink: 0; width: 250px;">
                <div class="border rounded p-3 h-100">
                    <h4 class="mb-3">Players</h4>
                    <ul class="list-group">
                        <li class="list-group-item">Player 1</li>
                        <li class="list-group-item">Player 2</li>
                        <li class="list-group-item">Player 3</li>
                    </ul>
                </div>
            </div>

        </div>
        <div class="w-100 mt-4" style="max-width: 800px;">
        <div class="border rounded p-3" id="gameCard">

            <div id="gameStatus" class="mb-2 fw-bold text-center"></div>

            <h5 id="question" class="text-center"></h5>

            <div id="answers" class="d-flex flex-column gap-2 mt-3"></div>

            <div id="feedback" class="mt-3 fw-bold text-center"></div>

        </div>
        </div>

    </main>

    <!-- Question Card -->
        <div id="gameCard" class="card shadow p-4 w-100 mb-3" style="max-width: 700px;">
            <div id="question" class="fs-4 mb-4 text-center">Loading question...</div>

            <div id="answers" class="d-grid gap-2 mb-3">
                <!-- Buttons inserted by JS -->
            </div>

            <div id="feedback" class="fw-bold text-center mb-3"></div>
        </div>

        <!-- Next question button -->
        <div id="nextContainer" class="w-100 d-flex justify-content-center mb-3 px-2 px-md-0"
            style="max-width: 700px;">
            <button id="nextBtn" class="btn btn-success btn-lg px-4" disabled>
                Next Question
            </button>
        </div>

    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />

    <script th:inline="javascript">
        window.gameCode = /*"[[${session.gameCode}]]"*/ "";
        window.userId = /*"[[${session.u.id}]]"*/ "";
        window.questions = /*[[${questions}]]*/  [];
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>

    <script src="/js/triviaBlast.js"></script>
</body>

</html>
