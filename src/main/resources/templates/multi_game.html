<!DOCTYPE html>
<html lang="es" class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>TriviaBlast Game</title>
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="h-100 d-flex flex-column">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <div class="container-fluid p-3">
        <button class="btn btn-danger">Exit Game</button>
    </div>

    <main class="flex-grow-1 container-fluid d-flex justify-content-center align-items-start p-3">

        <div class="d-flex flex-wrap justify-content-center align-items-start gap-3"
            style="width: 100%; max-width: 1200px;">

            <div style="flex-shrink: 0; width: 70vw; max-width: 800px;">
                <div class="border rounded p-3" id="tablero-container"
                    style="width: 100%; height: auto; max-height: 80vh; overflow: hidden;">
                    <!-- Aquí se generará el tablero SVG -->
                </div>
            </div>

            <div style="flex-shrink: 0; width: 250px;">
                <div class="border rounded p-3 h-100">
                    <h4 class="mb-3">Players</h4>
                    <ul class="list-group">
                        <li class="list-group-item">Player 1</li>
                        <li class="list-group-item">Player 2</li>
                        <li class="list-group-item">Player 3</li>
                    </ul>
                </div>
            </div>


            <!--Cuadro enviar mensajes--> 
            <div style="flex-shrink: 0; width: 500px; background-color: #E5ECEC;">
                <div class="border rounded p-3 h-100">
                    
                    <!-- recepción de mensajes -->
                    <div class="py-5" id="mensajes">
                    </div>
                    <!-- envío de mensajes -->
                    <div class="py-5 row ">
                        <form th:action="@{'/game/' + ${game.code} + '/msg'}" method="POST">
                            <input type="text" id="message" placeholder="Escribe por aquí" />
                            <button id="sendmsg" class="btn btn-secondary" type="submit"><i class="bi bi-send"></i></button>
                        </form>
                    </div>

                </div>
            </div>

        </div>

    </main>


    <th:block th:replace="~{fragments/footer.html :: footer}" />
    <script>
        
        document.addEventListener("DOMContentLoaded", () => {

            // topic
            if (config.topics.indexOf("[[${game.code}?:'???']]") == -1) {
                window.setTimeout(() => ws.subscribe("/topic/[[${game.code}?:'???']]", ws.receive),1000); 
            }
            
            // envio de mensajes con AJAX
            let b = document.getElementById("sendmsg");
            b.onclick = (e) => {
                e.preventDefault();
                 if (!document.getElementById("message").value) return; // evita mensajes vacíos
                go(b.parentNode.action, 'POST', {
                        message: document.getElementById("message").value
                    })
                    .then(d => {
                        console.log("happy", d);
                        document.getElementById("message").value="";
                    })
                    .catch(e => console.log("sad", e))
            }

            // cómo pintar 1 mensaje (devuelve html que se puede insertar en un div)
            function renderMsg(msg) {
                console.log("rendering: ", msg);
                const date = new Date(msg.sent);
                const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `<div class='${msg.from == "[[${u.username}]]"? "me" : "notme"} chatmsg'>
                    ${msg.from} ${time}
                    <div>${msg.text}</div>
                    </div>`;
            }


            // pinta mensajes viejos al cargarse, via AJAX
            let messageDiv = document.getElementById("mensajes");
            go(config.rootUrl + "/game/[[${game.code}?:'???']]/msg", "GET").then(ms =>
                ms.forEach(m => messageDiv.insertAdjacentHTML("beforeend", renderMsg(m))));

            // y aquí pinta mensajes según van llegando
            if (ws.receive) {
                const oldFn = ws.receive; // guarda referencia a manejador anterior
                ws.receive = (m) => {
                    oldFn(m); // llama al manejador anterior
                    messageDiv.insertAdjacentHTML("beforeend", renderMsg(m));
                }
            }

        });
    </script>

</body>

</html>
