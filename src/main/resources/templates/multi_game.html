<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Game</title>

    <style>
        #chatPanel {
            width: 320px;
            transition: transform 0.3s ease;
        }

        .chat-open {
            transform: translateX(0%);
        }

        .chat-closed {
            transform: translateX(100%);
        }

        .turn-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: gold;
            display: inline-block;
            margin-right: 6px;
        }

        .board-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
        }

        #tablero-container {
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 70%;
        }

        @media (max-width: 768px) {
            #chatPanel {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                background: white;
                z-index: 2000;
            }

            #playersPanel {
                width: 100%;
            }
        }
    </style>
</head>

<body class="vh-100 d-flex flex-column overflow-hidden">
    <div class="d-flex flex-grow-1 overflow-hidden">
        <!-- CHAT TAB (se mueve con el panel) -->
        <div id="chatTab" style="position: fixed; right: 0; top: 10%; transform: translateY(-50%);
            z-index: 2101; transition: right 0.3s;">

            <button onclick="toggleChat()" class="btn btn-dark rounded-end-0">
                <i id="chatIcon" class="bi bi-chevron-left"></i>
            </button>

        </div>

        <!-- CHAT PANEL -->
        <div id="chatPanel" class="border-start bg-light position-fixed h-100" style="width: 320px; right: 0; top: 0; transition: transform 0.3s ease;
        z-index: 2000;">
            <div class="p-2 d-flex flex-column h-100">

                <h5>Chat</h5>

                <div id="mensajes" class="border rounded p-2 mb-2 flex-grow-1" style="overflow-y:auto;"></div>

                <input class="form-control mb-2" placeholder="Mensaje..." />

                <button class="btn btn-primary w-100">
                    Enviar
                </button>

            </div>
        </div>

        <!-- LEFT PANEL (players + buttons) -->
        <div class="border-end p-3 d-flex flex-column h-100" style="width: 260px;">
            <!-- PLAYERS -->
            <h6>Players</h6>

            <ul class="list-group mb-3" id="player-list">
                <li class="list-group-item text-muted">
                    Loading players...
                </li>
            </ul>
        </div>

        <!-- BOARD CENTER -->
        <div class="flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="container-fluid d-flex flex-column justify-content-center min-vh-100 py-4">

                <div class="text-center mt-3">
                    <!-- El botón empieza oculto (d-none) por defecto; lo mostraremos solo a quien le toque -->
                    <button id="btn-tirar-dado" class="btn btn-primary btn-lg fw-bold px-5 py-3 shadow d-none">
                        🎲 ¡Tirar Dado!
                    </button>

                    <!-- Contenedor para ver el resultado de la última tirada -->
                    <div id="dado-resultado" class="fs-4 fw-bold text-muted mt-2"></div>
                </div>

                <div class="d-flex flex-column align-items-center ms-5"
                    style="width: calc(100vw - 200px); max-width: 1200px;">

                    <div id="tablero-container" class="w-100 rounded" style="aspect-ratio: 9 / 8; max-height: 75vh;">
                    </div>

                    <h3 id="categoria-display" class="text-center mt-4 fw-bold"
                        style="min-height: 1.5em; transition: color 0.2s ease;">
                        Pasa el ratón por una casilla para ver su categoría
                    </h3>

                </div>

            </div>
        </div>
    </div>

    <script>
        let chatOpen = false;
        let userTouchedChat = false;

        function setChat(open) {

            const panel = document.getElementById("chatPanel");
            const tab = document.getElementById("chatTab");
            const icon = document.getElementById("chatIcon");

            chatOpen = open;

            panel.classList.remove("chat-open", "chat-closed");

            if (open) {
                panel.classList.add("chat-open");
                tab.style.right = "320px";

                icon.classList.replace("bi-chevron-left", "bi-chevron-right");

            } else {
                panel.classList.add("chat-closed");
                tab.style.right = "0px";

                icon.classList.replace("bi-chevron-right", "bi-chevron-left");
            }
        }

        function toggleChat() {
            userTouchedChat = true;
            setChat(!chatOpen);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const isMobile = window.innerWidth < 768;
            setChat(!isMobile);
        });

        document.addEventListener("DOMContentLoaded", () => {

            const isMobile = window.innerWidth < 768;

            setChat(!isMobile);
        });
    </script>

    <!-- BOARD SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js"></script>
    <script th:src="@{/js/stomp.js}" src="js/stomp.js"></script>
    <script th:src="@{/js/iw.js}" src="js/iw.js"></script>
    <script th:src="@{/js/gameClient.js}"></script>
    <script th:inline="javascript">

        document.addEventListener("DOMContentLoaded", () => {

            GameClient.init({
                gameCode: /*[[${game.code}]]*/ "",
                currentUserId: /*[[${u.id}]]*/ 0,
                hostId: /*[[${game.host.id}]]*/ 0,
                categories: /*[[${categories}]]*/[],
                mode: "match"
            }, ws);

            GameClient.loadPlayers();
        });

    </script>

</body>

</html>
