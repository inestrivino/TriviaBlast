<!--
    Barra de navegación dinámica de TriviaBlast
    Muestra/oculta opciones según el estado de la sesión (${session.u})
-->
<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>TriviaBlast Nav Fragment</title>
</head>

<body class="d-flex flex-column h-100">

    <header th:fragment="nav">
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom shadow-sm">
            <div class="container-fluid">

                <!-- Logo + Enlace al Home (Siempre visible) -->
                <a class="navbar-brand d-flex align-items-center fw-bold text-primary" th:href="@{/}" href="/">
                    <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="logo TriviaBlast" width="32" height="32"
                        class="d-inline-block align-text-top me-2">
                    TriviaBlast
                </a>

                <!-- Hamburguesa para pantallas móviles -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                    aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Contenido del Menú -->
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav ms-auto align-items-center">

                        <!-- Enlace a la Propuesta (Siempre visible) -->
                        <li class="nav-item mx-1">
                            <a class="nav-link" th:href="@{/proposal}" href="/proposal">
                                Proposal
                            </a>
                        </li>

                        <!-- VISTAS EXCLUSIVAS PARA USUARIOS LOGUEADOS -->
                        <th:block th:if="${session.u != null}">

                            <li class="nav-item mx-1">
                                <a class="nav-link" th:href="@{/user/scoreboard}" href="/scoreboard">
                                    Scoreboard
                                </a>
                            </li>

                            <!-- Enlace directo a Profile -->
                            <li class="nav-item mx-1">
                                <a class="nav-link fw-semibold" th:href="@{/user/profile}" href="/user/profile">
                                    <i class="bi bi-person-circle me-1"></i>Profile
                                </a>
                            </li>

                        </th:block>

                        <!-- COMPONENTES DE LOGIN (Solo si NO hay sesión activa) -->
                        <th:block th:unless="${session.u != null}">

                            <!-- Botón de Login normal -->
                            <li class="nav-item mx-2">
                                <a class="btn btn-primary btn-sm px-3" th:href="@{/login}" href="/login">
                                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                                </a>
                            </li>

                            <!-- Contenedor compacto de Login Automático de Debug (A / B) -->
                            <li class="nav-item d-flex align-items-center gap-1 bg-white p-1 rounded border border-danger-subtle mx-1"
                                th:if="${application.debug}" title="Modo Debug: Login rápido">
                                <span class="text-danger small px-1 font-monospace fw-bold">DEBUG:</span>

                                <!-- Login rápido como 'a' -->
                                <form th:action="@{/login}" method="post" class="m-0">
                                    <input type="hidden" name="username" value="a">
                                    <input type="hidden" name="password" value="aa">
                                    <button type="submit" class="btn btn-xs btn-outline-danger py-0 px-2 fw-bold"
                                        style="font-size: 0.75rem;">A</button>
                                </form>

                                <!-- Login rápido como 'b' -->
                                <form th:action="@{/login}" method="post" class="m-0">
                                    <input type="hidden" name="username" value="b">
                                    <input type="hidden" name="password" value="aa">
                                    <button type="submit" class="btn btn-xs btn-outline-danger py-0 px-2 fw-bold"
                                        style="font-size: 0.75rem;">B</button>
                                </form>
                            </li>

                        </th:block>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

</body>

</html>
