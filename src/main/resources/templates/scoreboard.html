<!DOCTYPE html>
<html lang="en" class="h-100" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Scoreboard</title>
</head>

<body class="d-flex flex-column h-100">

    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container mt-5">

            <h1 class="text-center mb-4">Scoreboard</h1>

            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">

                    <div class="card shadow p-4">

                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Points</th>
                                        <th sec:authorize="hasRole('ADMIN')">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${users}"
                                        th:classappend="${!user.visibilityState} ? 'opacity-50'">

                                        <td th:text="${user.username}">Name</td>
                                        <td th:text="${user.totalPoints}">Points</td>

                                        <td sec:authorize="hasRole('ADMIN')">
                                            <button type="button" class="btn btn-sm toggle-btn"
                                                th:classappend="${user.visibilityState} ? 'btn-outline-danger' : 'btn-success'"
                                                th:text="${user.visibilityState} ? 'Hide' : 'Display'"
                                                th:attr="data-id=${user.id}">
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />

</body>

</html>
