<!DOCTYPE html>
<html lang="en" class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="fragments/head :: header" />
    <title>User Profile</title>
</head>

<body class="d-flex flex-column h-100">

    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-shrink-0">
        <!--TO DO: FILL DINAMICALLY-->
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">

                    <div class="card shadow p-4 position-relative">

                        <!-- Button to open edit modal -->
                        <button
                            class="btn btn-secondary position-absolute top-0 end-0 m-3 d-flex align-items-center justify-content-center "
                            data-bs-toggle="modal" data-bs-target="#miModal">
                            Edit
                            <i class="bi bi-gear-fill"></i>
                        </button>

                        <!-- Edit profile modal -->
                        <div class="modal fade" id="miModal" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title">Settings</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>

                                    <div class="modal-body">

                                        <form th:action="@{'/user/' + ${user.id}}" method="post">

                                            <!-- CSRF -->
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                            <!-- USERNAME -->
                                            <div class="mb-3">
                                                <label class="form-label">Username</label>
                                                <input type="text" class="form-control"
                                                    name="username"
                                                    th:value="${user.username}">
                                            </div>

                                            <!-- EMAIL -->
                                            <div class="mb-3">
                                                <label class="form-label">Email</label>
                                                <input type="email" class="form-control"
                                                    name="email"
                                                    th:value="${user.email}">
                                            </div>

                                            <!-- PASSWORD -->
                                            <div class="mb-3">
                                                <label class="form-label">New Password</label>
                                                <input type="password" class="form-control"
                                                    name="password"
                                                    placeholder="New password">
                                            </div>

                                            <!-- REPEAT PASSWORD -->
                                            <div class="mb-3">
                                                <label class="form-label">Repeat Password</label>
                                                <input type="password" class="form-control"
                                                    name="pass2"
                                                    placeholder="Repeat password">
                                            </div>

                                            <button type="submit" class="btn btn-primary w-100">
                                                Save changes
                                            </button>
                                        </form>
                                    </div>

                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                                            Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Profile picture -->
                        <div class="text-center">
                            <img class="rounded-circle mb-3" style="max-width:150px" th:src="@{'/user/' + ${user.id} + '/pic'}"
                                alt="User Avatar">
                        </div>
                        
                        <form th:action="@{'/user/' + ${user.id} + '/pic'}"
                            method="post"
                            enctype="multipart/form-data"
                            class="mb-3">

                            <!-- CSRF -->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <input type="file" name="photo" class="form-control mb-2">

                            <button type="submit" class="btn btn-primary w-100">
                                Change profile picture
                            </button>
                        </form>

                        <!-- Username -->
                        <h2 class="text-center mb-3"  th:text="${user.username}">Username</h2>

                        <hr>

                        <!-- Total Points -->
                        <p>
                            <strong>Total Points:</strong>
                            <span class="text-success">0</span>
                        </p>

                        <!-- ACTION BUTTONS -->
                        <div class="d-grid gap-2">
                            <!-- Logout -->
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="btn btn-outline-secondary w-100">Log Out</button>
                            </form>

                            <!-- Delete Account -->
                            <form th:action="@{'/user/' + ${user.id} + '/delete'}" method="post"
                                onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-danger w-100">Delete Account</button>
                            </form>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="fragments/footer :: footer" />

</body>

</html>
