<!--
    Formulario para crear una partida multijugador
    Hace POST a /game/multi_game
-->

<!DOCTYPE html>
<html lang="en" class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Multiplayer Game Setup</title>
    <!---->
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="d-flex align-items-center justify-content-center h-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4 text-center">

                    <h1 class="mb-5">Multiplayer Game Setup</h1>

                    <form th:action="@{/game/multi_game}" method="POST">

                        <div class="mb-4">

                            <label class="form-label fs-5">Choose categories:</label>

                            <div class="text-start">
                                <!-- Select all -->
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="selectAll">
                                    <label class="form-check-label fw-bold" for="selectAll">
                                        Select all
                                    </label>
                                </div>

                                <hr>
                                <div class="row">
                                    <div th:each="cat : ${categories}" class="col-6 mb-2">
                                        <div class="form-check">
                                            <input class="form-check-input category-checkbox" type="checkbox"
                                                name="categories" th:value="${cat.id}" th:id="'cat-' + ${cat.id}">

                                            <label class="form-check-label" th:for="'cat-' + ${cat.id}"
                                                th:text="${cat.label}">
                                            </label>
                                        </div>

                                    </div>
                                </div>

                                <small class="text-muted">
                                    If you don't choose any, all categories will be used
                                </small>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fs-5">Choose the game difficulty:</label>
                            <select class="form-select" name="difficulty">
                                <option value="easy" selected>Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fs-5">Choose board size:</label>
                            <select class="form-select" name="boardSize">
                                <option value="16">16</option>
                                <option value="24">24</option>
                                <option value="32">32</option>
                                <option value="40">40</option>
                                <option value="48">48</option>
                                <option value="56">56</option>
                                <option value="64" selected>64</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg px-5">Create Game</button>

                    </form>

                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />

    <script th:inline="javascript">
        //código para manejar los datos que se envían a la creación de partidas según lo que se haya seleccionado en cada input
        document.addEventListener("DOMContentLoaded", () => {
            const selectAll = document.getElementById("selectAll");
            const checkboxes = document.querySelectorAll(".category-checkbox");

            selectAll.addEventListener("change", () => {
                checkboxes.forEach(cb => cb.checked = selectAll.checked);
            });

            checkboxes.forEach(cb => {
                cb.addEventListener("change", () => {
                    const allChecked = Array.from(checkboxes).every(c => c.checked);
                    selectAll.checked = allChecked;
                });
            });

        });
    </script>

</body>

</html>
